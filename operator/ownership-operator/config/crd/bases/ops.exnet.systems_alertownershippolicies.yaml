                          severity: { type: string }
                          labels:
                            type: object
                            additionalProperties: { type: string }
                      owner:
                        type: object
                        properties:
                          primary:
                            type: object
                            properties:
                              type: { type: string }
                              ref: { type: string }
                          secondary:
                            type: object
                            properties:
                              type: { type: string }
                              ref: { type: string }
                          escalationPolicyRef: { type: string }
            status:
              type: object
              properties:
                observedGeneration: { type: integer }
                ruleCount: { type: integer }

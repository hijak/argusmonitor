apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertownershippolicies.ops.exnet.systems
spec:
  group: ops.exnet.systems
  scope: Cluster
  names:
    plural: alertownershippolicies
    singular: alertownershippolicy
    kind: AlertOwnershipPolicy
    shortNames: [aopol]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ownership-operator
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["ops.exnet.systems"]
    resources: ["ownershippolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["ops.exnet.systems"]
    resources: ["ownershippolicies/status", "alertownershippolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["ops.exnet.systems"]
    resources: ["alertownershippolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]

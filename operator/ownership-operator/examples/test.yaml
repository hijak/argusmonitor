apiVersion: v1
kind: Namespace
metadata:
  name: ownership-operator-test
---
apiVersion: ops.exnet.systems/v1alpha1
kind: OwnershipPolicy
metadata:
  name: catch-all
spec:
  defaultOwner:
    primary:
      type: user
      ref: mr-a
    secondary:
      type: user
      ref: mr-b
    escalationPolicyRef: global-default
  rules:
    - match:
        namespace: ownership-operator-test
        kind: Deployment
        labels:
          app: project-b
      owner:
        primary:
          type: user
          ref: mr-b
        secondary:
          type: user
          ref: mr-a
        escalationPolicyRef: project-b-hours
---
apiVersion: ops.exnet.systems/v1alpha1
kind: AlertOwnershipPolicy
metadata:
  name: default-alert-routing
spec:
  inheritFromObjectOwnership: true
  defaultOwner:
    primary:
      type: team
      ref: catch-all-team
  rules:
    - match:
        namespace: ownership-operator-test
        alertName: HighErrorRate
        severity: critical
        labels:
          service: payments
      owner:
        primary:
          type: team
          ref: payments-primary
        secondary:
          type: user
          ref: mr-b
        escalationPolicyRef: payments-critical
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-b-api
  namespace: ownership-operator-test
  labels:
    app: project-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-b
  template:
    metadata:
      labels:
        app: project-b
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catch-all-api
  namespace: ownership-operator-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catch-all
  template:
    metadata:
      labels:
        app: catch-all
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

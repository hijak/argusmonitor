name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build backend image
        run: docker build -t argus-backend:ci ./backend

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build frontend image
        run: docker build -t argus-frontend:ci ./frontend

  build-agent:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vordr-agent-linux-amd64
          - os: macos-latest
            artifact: vordr-agent-darwin-arm64
          - os: windows-latest
            artifact: vordr-agent-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd agent
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build agent binary
        run: |
          cd agent
          pyinstaller --clean --noconfirm vordr-agent.spec

      - name: Verify binary exists
        shell: bash
        run: ls -lh agent/dist/

  docker-compose:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build runtime services
        run: docker compose build backend worker frontend

      - name: Start runtime services
        run: |
          docker compose up -d postgres redis backend worker frontend
          sleep 30

      - name: Health check
        run: |
          curl -f http://localhost:8000/api/health
          curl -f http://localhost:8080/

      - name: Teardown
        if: always()
        run: docker compose down -v

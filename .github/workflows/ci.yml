name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build backend image
        run: docker build -t argus-backend:ci ./backend

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build frontend image
        run: docker build -t argus-frontend:ci ./frontend

  docker-compose:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build

      - name: Start services
        run: |
          docker compose up -d
          sleep 30

      - name: Health check
        run: |
          curl -f http://localhost:8000/api/health
          curl -f http://localhost:8080/

      - name: Teardown
        if: always()
        run: docker compose down -v

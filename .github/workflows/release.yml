name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-containers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            context: ./backend
            image: ghcr.io/${{ github.repository }}/backend
          - component: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository }}/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-agent:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: vordr-agent-linux-amd64
            binary: vordr-agent
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: vordr-agent-linux-arm64
            binary: vordr-agent
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            artifact: vordr-agent-darwin-amd64
            binary: vordr-agent
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: vordr-agent-darwin-arm64
            binary: vordr-agent
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: vordr-agent-windows-amd64
            binary: vordr-agent.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd agent
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build agent binary
        run: |
          cd agent
          pyinstaller --clean --noconfirm vordr-agent.spec

      - name: Rename binary
        shell: bash
        run: mv agent/dist/${{ matrix.binary }} agent/dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: agent/dist/${{ matrix.artifact }}

  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-push-containers, build-agent]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all agent artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vordr-agent-*
          path: release-assets
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x release-assets/vordr-agent-linux-* release-assets/vordr-agent-darwin-* || true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum vordr-agent-* > checksums-sha256.txt

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          cat > changelog.md << 'HEADER'
          ## Changes
          HEADER
          echo "" >> changelog.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> changelog.md
          cat >> changelog.md << EOF

          ## Container Images

          \`\`\`
          docker pull ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
          docker pull ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}
          \`\`\`

          ## Agent Downloads

          | Platform | Architecture | Binary |
          |----------|-------------|--------|
          | Linux | amd64 | \`vordr-agent-linux-amd64\` |
          | Linux | arm64 | \`vordr-agent-linux-arm64\` |
          | macOS | Intel | \`vordr-agent-darwin-amd64\` |
          | macOS | Apple Silicon | \`vordr-agent-darwin-arm64\` |
          | Windows | amd64 | \`vordr-agent-windows-amd64\` |

          ### Quick Install

          \`\`\`bash
          # Linux (amd64)
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/vordr-agent-linux-amd64 -o /usr/local/bin/vordr-agent
          chmod +x /usr/local/bin/vordr-agent

          # macOS (Apple Silicon)
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/vordr-agent-darwin-arm64 -o /usr/local/bin/vordr-agent
          chmod +x /usr/local/bin/vordr-agent
          \`\`\`
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          generate_release_notes: false
          files: release-assets/*

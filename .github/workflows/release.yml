name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            context: ./backend
            image: ghcr.io/${{ github.repository }}/backend
          - component: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository }}/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "## Changes" > changelog.md
          echo "" >> changelog.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> changelog.md
          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Container Images" >> changelog.md
          echo "" >> changelog.md
          echo '```' >> changelog.md
          echo "docker pull ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}" >> changelog.md
          echo "docker pull ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}" >> changelog.md
          echo '```' >> changelog.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          generate_release_notes: false

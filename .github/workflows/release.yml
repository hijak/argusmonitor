name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-containers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            context: ./backend
            image: ghcr.io/${{ github.repository }}/backend
          - component: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository }}/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-agent:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: vordr-agent
            package_root: vordr-agent_linux_amd64
            release_asset: vordr-agent_linux_amd64.tar.gz
            archive_format: tar.gz
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            binary: vordr-agent
            package_root: vordr-agent_linux_arm64
            release_asset: vordr-agent_linux_arm64.tar.gz
            archive_format: tar.gz
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            binary: vordr-agent
            package_root: vordr-agent_darwin_amd64
            release_asset: vordr-agent_darwin_amd64.tar.gz
            archive_format: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: vordr-agent
            package_root: vordr-agent_darwin_arm64
            release_asset: vordr-agent_darwin_arm64.tar.gz
            archive_format: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: vordr-agent.exe
            package_root: vordr-agent_windows_amd64
            release_asset: vordr-agent_windows_amd64.zip
            archive_format: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd agent
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build agent binary
        run: |
          cd agent
          pyinstaller --clean --noconfirm vordr-agent.spec

      - name: Stage release package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_DIR="package/${{ matrix.package_root }}"
          mkdir -p "$PACKAGE_DIR"
          cp "agent/dist/${{ matrix.binary }}" "$PACKAGE_DIR/${{ matrix.binary }}"
          cp agent/README.md "$PACKAGE_DIR/README.md"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp -R agent/systemd "$PACKAGE_DIR/systemd"
          fi

      - name: Create tar.gz archive
        if: matrix.archive_format == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          tar -C package -czf "dist-release/${{ matrix.release_asset }}" "${{ matrix.package_root }}"

      - name: Create zip archive
        if: matrix.archive_format == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cd package
          7z a "../dist-release/${{ matrix.release_asset }}" "${{ matrix.package_root }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_asset }}
          path: dist-release/${{ matrix.release_asset }}

  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-push-containers, build-agent]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all agent release assets
        uses: actions/download-artifact@v4
        with:
          pattern: vordr-agent_*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum vordr-agent_* > checksums-sha256.txt

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          cat > changelog.md << 'HEADER'
          ## Changes
          HEADER
          echo "" >> changelog.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> changelog.md
          cat >> changelog.md << EOF

          ## Container Images

          \`\`\`
          docker pull ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
          docker pull ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}
          \`\`\`

          ## Agent Distribution

          Canonical public distribution for node onboarding binaries is GitHub Releases for this repository.
          Every tagged release publishes packaged agent assets plus a shared SHA-256 manifest.

          ### Release Assets

          | Platform | Architecture | Asset |
          |----------|-------------|--------|
          | Linux | amd64 | \`vordr-agent_linux_amd64.tar.gz\` |
          | Linux | arm64 | \`vordr-agent_linux_arm64.tar.gz\` |
          | macOS | Intel | \`vordr-agent_darwin_amd64.tar.gz\` |
          | macOS | Apple Silicon | \`vordr-agent_darwin_arm64.tar.gz\` |
          | Windows | amd64 | \`vordr-agent_windows_amd64.zip\` |
          | All | checksum manifest | \`checksums-sha256.txt\` |

          ### Download URL Pattern

          \`\`\`text
          https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/<asset-name>
          \`\`\`

          ### Linux Install Example

          \`\`\`bash
          curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/vordr-agent_linux_amd64.tar.gz
          curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums-sha256.txt
          grep ' vordr-agent_linux_amd64.tar.gz$' checksums-sha256.txt | sha256sum -c -
          tar -xzf vordr-agent_linux_amd64.tar.gz
          sudo ./vordr-agent_linux_amd64/systemd/install-systemd.sh \
            ./vordr-agent_linux_amd64/vordr-agent \
            ./vordr-agent_linux_amd64/systemd/vordr-agent.env.example \
            ./vordr-agent_linux_amd64/systemd/vordr-agent.service
          \`\`\`
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          generate_release_notes: false
          files: release-assets/*

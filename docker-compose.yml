services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ARGUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      ARGUS_DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      ARGUS_REDIS_URL: redis://redis:6379/0
      ARGUS_SECRET_KEY: ${ARGUS_SECRET_KEY:-change-me-in-production-use-a-real-secret-key}
      ARGUS_OPENAI_API_KEY: ${ARGUS_OPENAI_API_KEY:-}
      ARGUS_OPENAI_MODEL: ${ARGUS_OPENAI_MODEL:-gpt-4o-mini}
      ARGUS_OPENAI_BASE_URL: ${ARGUS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ARGUS_OPENAI_APP_NAME: ${ARGUS_OPENAI_APP_NAME:-ArgusMonitor}
      ARGUS_OPENAI_SITE_URL: ${ARGUS_OPENAI_SITE_URL:-}
      ARGUS_DEMO_MODE: ${ARGUS_DEMO_MODE:-false}
      ARGUS_CORS_ORIGINS: "http://localhost:8080,http://localhost:5173,http://frontend:8080"
      ARGUS_DEBUG: "false"
      ARGUS_SCHEDULER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      ARGUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      ARGUS_DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      ARGUS_REDIS_URL: redis://redis:6379/0
      ARGUS_SECRET_KEY: ${ARGUS_SECRET_KEY:-change-me-in-production-use-a-real-secret-key}
      ARGUS_OPENAI_API_KEY: ${ARGUS_OPENAI_API_KEY:-}
      ARGUS_OPENAI_MODEL: ${ARGUS_OPENAI_MODEL:-gpt-4o-mini}
      ARGUS_OPENAI_BASE_URL: ${ARGUS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ARGUS_OPENAI_APP_NAME: ${ARGUS_OPENAI_APP_NAME:-ArgusMonitor}
      ARGUS_OPENAI_SITE_URL: ${ARGUS_OPENAI_SITE_URL:-}
      ARGUS_DEMO_MODE: ${ARGUS_DEMO_MODE:-false}
      ARGUS_DEBUG: "false"
      ARGUS_SCHEDULER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    ports:
      - "8788:8080"
    restart: unless-stopped

  docs-site:
    build:
      context: ./docs
      dockerfile: Dockerfile
    ports:
      - "8789:8080"
    restart: unless-stopped

  plugin-directory:
    build:
      context: ./plugin-directory
      dockerfile: Dockerfile
    ports:
      - "8790:8080"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      VORDR_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      VORDR_DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      VORDR_REDIS_URL: redis://redis:6379/0
      VORDR_SECRET_KEY: ${VORDR_SECRET_KEY:-change-me-in-production-use-a-real-secret-key}
      VORDR_OPENAI_API_KEY: ${VORDR_OPENAI_API_KEY:-}
      VORDR_OPENAI_MODEL: ${VORDR_OPENAI_MODEL:-gpt-4o-mini}
      VORDR_OPENAI_BASE_URL: ${VORDR_OPENAI_BASE_URL:-https://api.openai.com/v1}
      VORDR_OPENAI_APP_NAME: ${VORDR_OPENAI_APP_NAME:-Vordr}
      VORDR_OPENAI_SITE_URL: ${VORDR_OPENAI_SITE_URL:-}
      VORDR_DEMO_MODE: ${VORDR_DEMO_MODE:-false}
      VORDR_LICENSE_KEY: ${VORDR_LICENSE_KEY:-}
      VORDR_CORS_ORIGINS: ${VORDR_CORS_ORIGINS:-http://localhost:8080,http://localhost:5173,http://frontend:8080}
      VORDR_DEBUG: "false"
      VORDR_SCHEDULER_ENABLED: "false"
      VORDR_TRANSACTION_ARTIFACTS_DIR: /data/transactions
    volumes:
      - transactiondata:/data/transactions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      VORDR_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      VORDR_DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-argus}
      VORDR_REDIS_URL: redis://redis:6379/0
      VORDR_SECRET_KEY: ${VORDR_SECRET_KEY:-change-me-in-production-use-a-real-secret-key}
      VORDR_OPENAI_API_KEY: ${VORDR_OPENAI_API_KEY:-}
      VORDR_OPENAI_MODEL: ${VORDR_OPENAI_MODEL:-gpt-4o-mini}
      VORDR_OPENAI_BASE_URL: ${VORDR_OPENAI_BASE_URL:-https://api.openai.com/v1}
      VORDR_OPENAI_APP_NAME: ${VORDR_OPENAI_APP_NAME:-Vordr}
      VORDR_OPENAI_SITE_URL: ${VORDR_OPENAI_SITE_URL:-}
      VORDR_DEMO_MODE: ${VORDR_DEMO_MODE:-false}
      VORDR_LICENSE_KEY: ${VORDR_LICENSE_KEY:-}
      VORDR_DEBUG: "false"
      VORDR_SCHEDULER_ENABLED: "false"
      VORDR_TRANSACTION_ARTIFACTS_DIR: /data/transactions
    volumes:
      - transactiondata:/data/transactions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0 if b'app.worker' in open('/proc/1/cmdline', 'rb').read() else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "8080:8080"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  transactiondata:
